  stated_purpose: >
    OpenAI's local-first coding agent — a 91-crate Rust monorepo with multi-platform
    sandboxing, multi-model support, ratatui TUI, and an MITM network proxy.
  notable_features:
    - Multi-platform sandboxing (Seatbelt/macOS, Landlock+bubblewrap+seccomp/Linux, restricted tokens/Windows)
