design_philosophy:
  approach: "Pregel superstep model applied to LLM agents — durable, resumable, time-travel-debuggable"
  tradeoff: "Closed-source server runtime, LangSmith ecosystem gravity, steeper learning curve"

identity:
  repo: https://github.com/langchain-ai/langgraph
