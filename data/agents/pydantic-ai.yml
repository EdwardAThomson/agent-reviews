  stated_purpose: >
    GenAI agent framework, the Pydantic way — production-stable type-safe Python
    framework from the Pydantic team, with generic Agent[DepsT, OutputT]
    dependency injection, 33 model providers, first-class MCP/A2A/AG-UI protocols,
    durable execution via Temporal/DBOS/Prefect, Pydantic Evals, and Logfire
    instrumentation.
  notable_features:
    - Generic Agent[DepsT, OutputT] types caught at type-check time
    - 33 model providers + 11 primary model implementations
    - First-class MCP (stdio, HTTP, SSE, StreamableHTTP) + A2A + AG-UI + Vercel AI SDK
    - Durable execution via Temporal, DBOS, Prefect integrations
