design_philosophy:
  approach: "Type-safe Python-first — generic Agent[DepsT, OutputT], ships Pydantic Evals, real-API recorded tests"
  tradeoff: "Single-agent-first (no built-in multi-agent), 37+ optional dep groups, no server runtime, Logfire gravity"

