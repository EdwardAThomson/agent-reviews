  stated_purpose: >
    The maximalist personal AI assistant — 459k LOC TypeScript monolith with 20+
    channels, 109 bundled extensions, native iOS/Android/macOS apps, and a plugin
    SDK with enforced architecture boundaries.
  notable_features:
    - 109 bundled extensions with typed Plugin SDK
    - 20+ messaging channels (WhatsApp, Telegram, Discord, Slack, Signal, iMessage, Matrix, Teams, ...)
