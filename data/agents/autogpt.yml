identity:
  repo: https://github.com/Significant-Gravitas/AutoGPT
  commit: ef477ae4b9ea1d6f06807306ed0fde80dbd615a3
  commit_date: 2026-04-08
  review_date: 2026-04-10
  language: [Python, TypeScript]
