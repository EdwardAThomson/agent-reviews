  stated_purpose: >
    The most feature-complete open-source AI software development platform —
    CodeAct paradigm, Docker/K8s sandboxing, 77.6% SWE-Bench, web UI, CLI,
    enterprise edition. Formerly OpenDevin.
  notable_features:
    - CodeAct paradigm unifying agent actions into code (published paper)
