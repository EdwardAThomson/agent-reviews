name: GBrain
slug: gbrain
category: frameworks
review: reviews/frameworks/gbrain.md
status: active

identity:
  repo: https://github.com/garrytan/gbrain
  commit: 27eb87f1f43d2a3eefa41f2ab404237b4f615938
  commit_date: 2026-04-10
  review_date: 2026-04-10
  language: [TypeScript]
  license: MIT
  loc: 6500
  files: null
  dependencies:
    direct: 6
    notes: "@anthropic-ai/sdk, @modelcontextprotocol/sdk, gray-matter, openai, pgvector, postgres"
  commits: 24
  contributors: 1
  stated_purpose: >
    A personal "second brain" that indexes markdown files into Postgres + pgvector
    for hybrid semantic search, exposed via MCP server and CLI. Built by Garry
    Tan (YC president).
  notable_features:
    - Compiled truth + append-only timeline knowledge model
    - Three-tier chunking (recursive, semantic with Savitzky-Golay, LLM-guided)
    - Contract-first operations (single definition generates CLI, MCP, tools-json)
    - Incremental git-to-brain sync with rename detection and force-push fallback
    - Hybrid search (RRF fusion, multi-query expansion, 4-layer dedup)
    - HNSW index on 1536-dim embeddings

capabilities:
  architecture:
    pattern: contract-first with pluggable BrainEngine + StorageBackend interfaces
    summary: >
      src/core/operations.ts defines ~30 operations as single source of truth.
      CLI and MCP server both generated from it. BrainEngine interface with
      30+ methods; currently only PostgresEngine implemented. StorageBackend
      pluggable (S3, Supabase, local).
  llm_integration:
    providers: 2
    gateway: direct
    provider_list: [openai, anthropic]
    auth: [api_key]
    notes: Narrow and deliberate. OpenAI for embeddings (text-embedding-3-large, 1536 dims) with batch processing, 5 retries, Retry-After parsing. Anthropic Claude Haiku for multi-query expansion and LLM-guided chunking. Both fail gracefully. No LLM synthesis.
  tool_calling:
    pattern: 30 MCP tools auto-generated from operations array
    mcp_support: true
    mcp_stance: supported
    builtin_tools: [create, read, update, search, chunks, links, tags, timeline, versions, files, stats, config]
    notes: MCP via stdio transport. Tool definitions auto-generated by converting ParamDef to JSON Schema. Parity test suite verifies structural identity between CLI, MCP, and tools-json outputs.
  memory:
    session_persistence: true
    compaction: false
    branching: true
    vector_store: true
    notes: >
      Core product. Knowledge model splits every page into "compiled truth"
      (current best understanding) above separator and append-only "timeline"
      below. Database schema has 10 tables (pages, content_chunks,
      links, tags, timeline_entries, page_versions, raw_data, files,
      ingest_log, config). Sync does incremental git-to-brain via git diff
      --name-status -M. Import idempotent via SHA-256 hashing.
  orchestration:
    pattern: none (retrieval/storage layer, not agent framework)
    sub_agents: false
    plan_mode: false
    notes: Orchestration delegated to external systems (OpenClaw, Hermes, any MCP client). Intelligence lives in skill markdown files — natural-language playbooks telling agents how to use GBrain's tools.
  io: [cli, mcp-server, typescript-library, tools-json]
  testing:
    framework: bun test
    file_count: 26
    faux_provider: false
    coverage_signal: 21 unit tests + 5 E2E against real Postgres+pgvector with 16-file fixture corpus; docker-compose.test.yml provides pgvector for local testing; E2E skip gracefully when DATABASE_URL unset.
  security:
    default_bash_sandbox: null
    approval_gate: n/a
    credential_storage: API keys from env only; database_url in ~/.gbrain/config.json with 0600 permissions
    notes: Config files with 0600 permissions. Row Level Security enabled on all 10 tables when connected role has BYPASSRLS. doctor command warns on RLS status. Slug validation rejects path traversal. Parameterized SQL throughout.
  repo_trust_surfaces:
    risk_level: null
    notes: Not collected in original review (pre-2026-04-21 methodology).
  deployment:
    install: "bun add -g github:garrytan/gbrain or compile to standalone binary"
    binary: true
    docker: false
    platforms: [linux, macos]
    notes: Single-user CLI tool. bun build --compile for standalone binaries (macOS ARM64, Linux x64). Recommended infra Supabase Pro ($25/month). docker-compose.test.yml for test Postgres; no production self-hosted Docker setup. OpenClaw plugin distribution via openclaw.plugin.json.
  docs: >
    Extensive for its age. README (710 lines) covers architecture, setup,
    knowledge model, search internals, schema, chunking, commands, storage
    estimates. CLAUDE.md for AI-assisted development. 6 docs + 7 skill
    markdown files as agent-facing playbooks. CONTRIBUTING.md, CHANGELOG.md,
    TODOS.md.

opinions:
  ratings:
    code_quality: 4
    maintainability: 4
  maturity: alpha
  innovation:
    highlights:
      - Compiled truth + timeline knowledge model (mirrors intelligence analysis tradecraft)
      - Three-tier chunking (recursive for speed, semantic with Savitzky-Golay smoothing, LLM-guided for high-value)
      - Contract-first operations — single definition generates CLI, MCP, and tools-json with parity test
      - Hand-rolled Savitzky-Golay smoothing in semantic chunker
      - Git-to-brain incremental sync with ancestry validation
  practical_utility:
    rating: moderate
    target_user: Someone with a large markdown corpus (1000+ files) who uses an MCP-compatible AI agent and wants semantic search.
  vendor_lock_in: moderate
  red_flags:
    - Global mutable DB connection in db.ts — breaks under concurrent access
    - database_url in plaintext config contains password (0600 permissions help but it's still credentials on disk)
    - Stub implementations — rewriteLinks is no-op (broken cross-references on rename), file_url returns fake URL, SQLite engine not implemented
    - No MCP rate limiting or auth — any MCP client can call mutating operations without throttling
    - Single contributor, 5 days old at review time — bus factor of 1
  summary: >
    A well-architected alpha-stage personal knowledge management system that solves
    a real problem — making large markdown corpora semantically searchable for AI
    agents. Contract-first operations design, three-tier chunking, and
    compiled-truth-plus-timeline model demonstrate genuine thoughtfulness. Code
    quality is high for a 5-day-old project with comprehensive testing and graceful
    degradation throughout. Main limitations are expected for its age — single
    contributor, stub features, and Supabase-centric deployment.
